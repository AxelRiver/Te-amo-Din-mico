<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Para mi estrellita ✨</title>

    <meta name="theme-color" content="#0f0c29">
    <link rel="manifest" href="manifest.json">

    <style>
        body {
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at 20% 30%, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff8e1;
            cursor: none;
        }
        #particles-js, #corazones-canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        #letra-canvas {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* Contenedor superior izquierdo: "Te amo, mi estrellita" + Contador */
        #top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 5;
            background: rgba(15, 12, 41, 0.65);
            backdrop-filter: blur(12px);
            padding: 16px 22px;
            border-radius: 20px;
            border: 1px solid rgba(255, 182, 193, 0.3);
            max-width: 290px;
        }

        #love-title {
            font-size: 1.45rem;
            color: #ff99cc;
            text-shadow: 0 0 12px rgba(255, 105, 180, 0.7);
            margin-bottom: 8px;
        }

        #love-subtitle {
            font-size: 1.05rem;
            color: #ffd1dc;
            margin-bottom: 6px;
        }

        #timer {
            font-size: 1.15rem;
            color: #ff99cc;
            font-weight: 600;
        }

        /* Burbuja de música flotante (inferior derecha) */
        #play-bubble {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 10;
            width: 68px;
            height: 68px;
            background: rgba(255, 105, 180, 0.25);
            border: 2px solid rgba(255, 182, 193, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.5);
        }

        #play-bubble:hover {
            transform: scale(1.15);
            background: rgba(255, 105, 180, 0.45);
        }

        #mensaje-pequeno {
            position: absolute;
            left: 50%;
            top: 82%;
            transform: translateX(-50%);
            font-size: clamp(1.1rem, 4vw, 1.8rem);
            text-align: center;
            text-shadow: 0 0 20px rgba(255,105,180,0.8);
            opacity: 0;
            transition: opacity 2s ease, transform 3s ease;
            z-index: 4;
            pointer-events: none;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            #top-left { top: 15px; left: 15px; padding: 14px 18px; max-width: 260px; }
            #love-title { font-size: 1.3rem; }
            #play-bubble { bottom: 20px; right: 20px; width: 60px; height: 60px; font-size: 26px; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <canvas id="corazones-canvas"></canvas>
    <canvas id="letra-canvas"></canvas>

    <!-- Texto + Contador Superior Izquierdo -->
    <div id="top-left">
        <div id="love-title">Te amo, mi estrellita ✨</div>
        <div id="love-subtitle">Nuestro amor lleva...</div>
        <div id="timer"></div>
    </div>

    <!-- Burbuja de música -->
    <div id="play-bubble" title="Reproducir nuestra canción">♫</div>

    <div id="mensaje-pequeno">
        Eres mi universo entero,<br>
        mi paz, mi locura y mi hogar 💗
    </div>

    <audio id="musica" loop preload="auto">
        <source src="1.mp3" type="audio/mpeg">
        Tu navegador no soporta audio :(
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <script>
        // ── Música ────────────────────────────────────────
        const audio = document.getElementById("musica");
        const playBubble = document.getElementById("play-bubble");

        playBubble.addEventListener("click", () => {
            audio.play().catch(e => console.log("Autoplay bloqueado:", e));
            playBubble.style.transform = "scale(0.85)";
            setTimeout(() => { playBubble.style.transform = "scale(1)"; }, 180);
        });

        // ── Contador de amor (desde 4 de abril de 2022) ─────────────────────
        function updateLoveTimer() {
            const startDate = new Date('2022-04-04T00:00:00');
            const diff = Date.now() - startDate.getTime();

            const days = Math.floor(diff / 86400000);
            const hours = Math.floor((diff % 86400000) / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);

            document.getElementById('timer').textContent = 
                `${days} días • ${hours}h ${minutes}m ${seconds}s`;
        }

        setInterval(updateLoveTimer, 1000);
        updateLoveTimer();

        // ── Partículas de fondo rosas/moradas ──
        particlesJS("particles-js", {
            particles: {
                number: { value: 180, density: { enable: true, value_area: 1000 } },
                color: { value: ["#ff99cc", "#ff66b2", "#d7aaff", "#ffffff", "#ffccdd"] },
                shape: { type: "circle" },
                opacity: { value: 0.6, random: true, anim: { enable: true, speed: 1.2, opacity_min: 0.1 } },
                size: { value: 2.8, random: true },
                line_linked: { enable: false },
                move: {
                    enable: true,
                    speed: 0.8,
                    direction: "none",
                    random: true,
                    straight: false,
                    out_mode: "out",
                    attract: { enable: true, rotateX: 600, rotateY: 1200 }
                }
            },
            interactivity: {
                detect_on: "canvas",
                events: { onhover: { enable: true, mode: "grab" }, onclick: { enable: false } },
                modes: { grab: { distance: 180, line_linked: { opacity: 0.4 } } }
            },
            retina_detect: true
        });

        // ── Corazones flotantes ───────────────────────────────
        const heartCanvas = document.getElementById("corazones-canvas");
        const hCtx = heartCanvas.getContext("2d");
        let hearts = [];

        function resizeCanvases() {
            heartCanvas.width = window.innerWidth;
            heartCanvas.height = window.innerHeight;
            document.getElementById("letra-canvas").width = window.innerWidth;
            document.getElementById("letra-canvas").height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvases);
        resizeCanvases();

        class Heart {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * heartCanvas.width;
                this.y = heartCanvas.height + 30;
                this.size = Math.random() * 18 + 12;
                this.speed = Math.random() * 1.2 + 0.6;
                this.opacity = Math.random() * 0.5 + 0.4;
                this.angle = Math.random() * Math.PI * 2;
                this.wobble = Math.random() * 0.03 + 0.01;
            }
            update() {
                this.y -= this.speed;
                this.angle += this.wobble;
                this.x += Math.sin(this.angle) * 1.5;
                if (this.y < -30) this.reset();
            }
            draw() {
                hCtx.save();
                hCtx.globalAlpha = this.opacity;
                hCtx.translate(this.x, this.y);
                hCtx.rotate(this.angle);
                hCtx.fillStyle = `hsl(${Math.random()*30 + 330}, 90%, 65%)`;
                hCtx.beginPath();
                hCtx.moveTo(0, -this.size/2);
                hCtx.bezierCurveTo(this.size/2, -this.size, this.size, -this.size/3, 0, this.size/2);
                hCtx.bezierCurveTo(-this.size, -this.size/3, -this.size/2, -this.size, 0, -this.size/2);
                hCtx.fill();
                hCtx.restore();
            }
        }

        for (let i = 0; i < 18; i++) hearts.push(new Heart());

        function animateHearts() {
            hCtx.clearRect(0, 0, heartCanvas.width, heartCanvas.height);
            hearts.forEach(h => { h.update(); h.draw(); });
            requestAnimationFrame(animateHearts);
        }
        animateHearts();

        // ── Partículas de texto (galaxia interactiva) ───────────────────────────────
        const fondoParticles = [];
        const fondoCount = 400;
        let mouse = { x: -1000, y: -1000, radius: 140 };

        document.addEventListener("mousemove", e => {
            const canvas = document.getElementById("letra-canvas");
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });
        document.addEventListener("mouseleave", () => { mouse.x = -1000; mouse.y = -1000; });

        function initFondoParticles() {
            fondoParticles.length = 0;
            const canvas = document.getElementById("letra-canvas");
            for (let i = 0; i < fondoCount; i++) {
                fondoParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.7,
                    vy: (Math.random() - 0.5) * 0.7,
                    active: true
                });
            }
        }

        const galaxyColors = [
            [255, 105, 180], [173, 216, 230], [186, 85, 211],
            [255, 182, 193], [138, 43, 226], [255, 255, 224],
            [0, 191, 255], [255, 255, 255], [218, 112, 214]
        ];

        function randomGalaxyColor() {
            const c = galaxyColors[Math.floor(Math.random() * galaxyColors.length)];
            return `rgb(${c[0]},${c[1]},${c[2]})`;
        }

        function animateFondoParticles(ctx, width, height) {
            for (const p of fondoParticles) {
                if (!p.active) continue;
                const mdx = p.x - mouse.x;
                const mdy = p.y - mouse.y;
                const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
                if (mdist < mouse.radius) {
                    const force = (mouse.radius - mdist) / mouse.radius;
                    const angle = Math.atan2(mdy, mdx);
                    p.vx += Math.cos(angle) * force * 1.7;
                    p.vy += Math.sin(angle) * force * 1.7;
                }
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, 2 * Math.PI);
                if (!p.color) p.color = randomGalaxyColor();
                ctx.fillStyle = p.color;
                ctx.globalAlpha = 0.5;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function mostrarMensajePequeno() {
            const mensaje = document.getElementById("mensaje-pequeno");
            mensaje.style.opacity = "1";
            mensaje.style.transform = "translateX(-50%) translateY(-30px)";
        }

        function drawWordParticles(textos) {
            const canvas = document.getElementById("letra-canvas");
            const ctx = canvas.getContext("2d");

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                initFondoParticles();
            }
            resize();
            window.addEventListener("resize", resize, { once: true });

            let fontSize, density, particleRadius;
            if (window.innerWidth <= 600) {
                fontSize = canvas.width * 0.38 / textos.length;
                density = 4;
                particleRadius = 2.2;
            } else {
                fontSize = canvas.width * 0.28 / textos.length;
                density = 6;
                particleRadius = 2;
            }

            ctx.font = `bold ${fontSize}px Arial Rounded MT Bold, Arial, sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            const totalHeight = fontSize * textos.length * 1.1;
            const startY = canvas.height / 2 - totalHeight / 2 + fontSize / 2;

            const points = [];
            for (let i = 0; i < textos.length; i++) {
                const y = startY + i * fontSize * 1.1;
                ctx.fillText(textos[i], canvas.width / 2, y);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                for (let yy = 0; yy < canvas.height; yy += density) {
                    for (let xx = 0; xx < canvas.width; xx += density) {
                        const idx = (yy * canvas.width + xx) * 4;
                        if (imageData.data[idx + 3] > 128) {
                            points.push({x: xx, y: yy});
                        }
                    }
                }
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }

            while (fondoParticles.length < points.length) {
                fondoParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: 0, vy: 0, active: true
                });
            }

            for (let i = 0; i < fondoParticles.length; i++) {
                if (i < points.length) {
                    fondoParticles[i].tx = points[i].x;
                    fondoParticles[i].ty = points[i].y;
                    fondoParticles[i].active = true;
                } else {
                    fondoParticles[i].active = false;
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let moving = false;
                for (const p of fondoParticles) {
                    if (!p.active) continue;
                    if (p.tx !== undefined && p.ty !== undefined) {
                        const dx = p.tx - p.x;
                        const dy = p.ty - p.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist > 0.1) moving = true;

                        const mdx = p.x - mouse.x;
                        const mdy = p.y - mouse.y;
                        const mdist = Math.sqrt(mdx*mdx + mdy*mdy);
                        if (mdist < mouse.radius) {
                            const force = (mouse.radius - mdist) / mouse.radius;
                            const angle = Math.atan2(mdy, mdx);
                            p.vx += Math.cos(angle) * force * 1.7;
                            p.vy += Math.sin(angle) * force * 1.7;
                        }

                        p.vx += dx * 0.006;
                        p.vy += dy * 0.006;
                        p.vx *= 0.96;
                        p.vy *= 0.96;
                        p.x += p.vx;
                        p.y += p.vy;

                        if (!p.color) p.color = randomGalaxyColor();
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, particleRadius, 0, 2 * Math.PI);
                        ctx.fillStyle = p.color;
                        ctx.fill();
                    }
                }
                if (moving) requestAnimationFrame(animate);
                else mostrarMensajePequeno();
            }

            let fondoFrames = 0;
            function fondoLoop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                animateFondoParticles(ctx, canvas.width, canvas.height);
                fondoFrames++;
                if (fondoFrames < 160) requestAnimationFrame(fondoLoop);
                else animate();
            }
            fondoLoop();
        }

        function morphWordParticles(textosA, textosB, opciones = {}) {
            const canvas = document.getElementById("letra-canvas");
            const ctx = canvas.getContext("2d");

            function getPointsFromText(textos, fontScale = 0.18) {
                let scale = fontScale;
                let density = 6;
                if (window.innerWidth <= 600) {
                    scale = fontScale * 2.1;
                    density = 4;
                } else {
                    scale = fontScale * 1.5;
                }
                const fontSize = canvas.width * scale / textos.length;
                ctx.font = `bold ${fontSize}px Arial Rounded MT Bold, Arial, sans-serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                const totalHeight = fontSize * textos.length * 1.1;
                const startY = canvas.height / 2 - totalHeight / 2 + fontSize / 2;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < textos.length; i++) {
                    const y = startY + i * fontSize * 1.1;
                    ctx.fillText(textos[i], canvas.width / 2, y);
                }

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const points = [];
                for (let y = 0; y < canvas.height; y += density) {
                    for (let x = 0; x < canvas.width; x += density) {
                        const idx = (y * canvas.width + x) * 4;
                        if (imageData.data[idx + 3] > 128) points.push({x, y});
                    }
                }
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return points;
            }

            const pointsA = getPointsFromText(textosA, opciones.fontScaleA || 0.18);
            const pointsB = getPointsFromText(textosB, opciones.fontScaleB || 0.10);

            const maxPoints = Math.max(pointsA.length, pointsB.length);
            while (fondoParticles.length < maxPoints) {
                fondoParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: 0, vy: 0, active: true,
                    color: randomGalaxyColor()
                });
            }

            for (let i = 0; i < fondoParticles.length; i++) {
                if (i < pointsA.length) {
                    fondoParticles[i].x = Math.random() * canvas.width;
                    fondoParticles[i].y = Math.random() * canvas.height;
                    fondoParticles[i].tx = pointsA[i].x;
                    fondoParticles[i].ty = pointsA[i].y;
                    fondoParticles[i].active = true;
                } else {
                    fondoParticles[i].active = false;
                }
            }

            let particleRadius = window.innerWidth <= 600 ? 2.2 : 2;

            function animateToA() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let moving = false;
                for (const p of fondoParticles) {
                    if (!p.active) continue;
                    const dx = p.tx - p.x;
                    const dy = p.ty - p.y;
                    if (Math.abs(dx) > 0.1 || Math.abs(dy) > 0.1) moving = true;

                    const mdx = p.x - mouse.x;
                    const mdy = p.y - mouse.y;
                    const mdist = Math.sqrt(mdx*mdx + mdy*mdy);
                    if (mdist < mouse.radius) {
                        const force = (mouse.radius - mdist) / mouse.radius;
                        const angle = Math.atan2(mdy, mdx);
                        p.vx += Math.cos(angle) * force * 1.7;
                        p.vy += Math.sin(angle) * force * 1.7;
                    }

                    p.vx += dx * 0.006;
                    p.vy += dy * 0.006;
                    p.vx *= 0.96;
                    p.vy *= 0.96;
                    p.x += p.vx;
                    p.y += p.vy;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, particleRadius, 0, 2 * Math.PI);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                }
                if (moving) requestAnimationFrame(animateToA);
                else {
                    setTimeout(() => {
                        for (let i = 0; i < fondoParticles.length; i++) {
                            if (i < pointsB.length) {
                                fondoParticles[i].tx = pointsB[i].x;
                                fondoParticles[i].ty = pointsB[i].y;
                                fondoParticles[i].active = true;
                            } else {
                                fondoParticles[i].active = false;
                            }
                        }
                        animateToB();
                    }, 2200);
                }
            }

            function animateToB() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let moving = false;
                for (const p of fondoParticles) {
                    if (!p.active) continue;
                    const dx = p.tx - p.x;
                    const dy = p.ty - p.y;
                    if (Math.abs(dx) > 0.1 || Math.abs(dy) > 0.1) moving = true;

                    const mdx = p.x - mouse.x;
                    const mdy = p.y - mouse.y;
                    const mdist = Math.sqrt(mdx*mdx + mdy*mdy);
                    if (mdist < mouse.radius) {
                        const force = (mouse.radius - mdist) / mouse.radius;
                        const angle = Math.atan2(mdy, mdx);
                        p.vx += Math.cos(angle) * force * 1.7;
                        p.vy += Math.sin(angle) * force * 1.7;
                    }

                    p.vx += dx * 0.006;
                    p.vy += dy * 0.006;
                    p.vx *= 0.96;
                    p.vy *= 0.96;
                    p.x += p.vx;
                    p.y += p.vy;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, particleRadius, 0, 2 * Math.PI);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                }
                if (moving) requestAnimationFrame(animateToB);
            }

            animateToA();
        }

        // ── Inicio ────────────────────────────────────────
        document.addEventListener("DOMContentLoaded", () => {
            morphWordParticles(
                ["TE AMO", "MUCHO"],
                ["ERES", "MI", "TODO"],
                { fontScaleA: 0.26, fontScaleB: 0.22 }
            );

            setTimeout(() => {
                document.getElementById("mensaje-pequeno").innerHTML =
                    `TE AMO con todo mi corazón,<br>mi estrellita, mi vida, mi todo 💫💗`;
                document.getElementById("mensaje-pequeno").style.opacity = "1";
                document.getElementById("mensaje-pequeno").style.transform = "translateX(-50%) translateY(-30px)";
            }, 8500);
        });

        // ── Service Worker ────────────────────────────────────────
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/service-worker.js")
                    .then(reg => console.log("Service Worker registrado", reg))
                    .catch(err => console.log("Error al registrar SW", err));
            });
        }
    </script>
</body>
</html>
