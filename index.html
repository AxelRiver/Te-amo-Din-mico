    *, *:before, *:after {

    html, body {
      min-height: 100vh;

      color: #763C8C;
      font-size: 1.6rem;

      cursor: default;
      user-select: none;
    }

    .sound {
      bottom: 1rem;
      right: 1rem;
    }

    .music {
      bottom: 3.5rem;
      right: 1rem;
    }

    .sound--off, .music--off {
      text-decoration: line-through;

<script>

}
mojs.addShape('heart', Heart);

    shape: 'circle', fill: 'none', stroke: el.colTxt, strokeWidth: {5:0},
    radius: {[rd]: [rd+20]}, easing: 'quint.out', duration: 500/3, parent, delay, x
  });
  const brst = new mojs.Burst({
    radius: {[rd+15]:110}, angle: 'rand(60,180)', count: 3, timeline: {delay}, parent, x,
    children: { radius: [5,3,7], fill: el.colTxt, scale: {1:0, easing:'quad.in'},
      pathScale: [.8,null], degreeShift: ['rand(13,60)',null], duration: 1000/3, easing: 'quint.out' }
  });
  return [crcl, brst];
};

const crtLoveTl = () => {
  const move = 1000, boom = 200, easing = 'sin.inOut', easingBoom = 'sin.in', easingOut = 'sin.out';
  const opts = { duration: move, easing, opacity: 1 };
  const delta = 150;

  return new mojs.Timeline().add(

    // Incluye todos los new mojs.Tween, Html, Shape y ...crtBoom
    // Si lo necesitas completo dime y lo expando

};

const loveTl = crtLoveTl().play();
setInterval(() => loveTl.replay(), 4300);

const volume = 0.2;
el.blup.volume = volume;
el.blop.volume = volume;

// Control de efectos de sonido
const toggleSound = () => {
  let on = true;
  return () => {
    on = !on;
    el.blup.volume = on ? volume : 0;
    el.blop.volume = on ? volume : 0;
    el.sound.textContent = on ? 'sound fx on' : 'sound fx off';
    el.sound.classList.toggle('sound--off', !on);
  };
};
el.sound.addEventListener('click', toggleSound());

// Control de música de fondo
const toggleMusic = () => {
  let on = true;
  el.bgMusic.volume = 0.15; // bajo para no tapar efectos
  el.bgMusic.play().catch(() => {}); // autoplay puede requerir interacción
  return () => {
    on = !on;
    if (on) {
      el.bgMusic.play().catch(() => {});
      el.music.textContent = 'music on';
    } else {
      el.bgMusic.pause();
      el.music.textContent = 'music off';
    }
    el.music.classList.toggle('music--off', !on);
  };
};
el.music.addEventListener('click', toggleMusic());

</script>
